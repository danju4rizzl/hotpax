# hotpax — Continuous Integration
# Runs on every push and pull-request targeting `main`.
# Steps: install → build (tsup) → test (bun test + happy-dom)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Bun ──────────────────────────────────────────────────────
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── 3. Cache Bun install ───────────────────────────────────────────────
      - name: Cache Bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # ── 4. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── 5. Type-check ──────────────────────────────────────────────────────
      - name: Type check
        run: bun run type-check

      # ── 6. Build (tsup → dist/) ────────────────────────────────────────────
      - name: Build
        run: bun run build

      # ── 7. Test (bun test + happy-dom via bunfig.toml) ────────────────────
      - name: Test
        run: bun run test
